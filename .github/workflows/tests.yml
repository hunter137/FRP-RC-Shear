name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas scipy scikit-learn joblib matplotlib \
                      openpyxl xlrd packaging threadpoolctl pytest

      - name: Install optional ML dependencies
        run: |
          pip install xgboost lightgbm optuna shap || true

      - name: Run tests (headless — no Qt display required)
        run: |
          python -m pytest tests/ -v --tb=short
